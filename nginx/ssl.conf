# ══════════════════════════════════════════════════════════
# Warm Hook Hugs — Nginx Configuration (SSL Enabled)
# ══════════════════════════════════════════════════════════
# Swap this in AFTER certbot has issued certificates:
#   cp nginx/ssl.conf nginx/default.conf
#   docker compose restart nginx
# ══════════════════════════════════════════════════════════

# ── Upstream: Gunicorn ──
upstream web_app {
    server web:8000;
}

# ── HTTP → HTTPS Redirect ──
server {
    listen 80;
    server_name otaskflow.com www.otaskflow.com 104.248.171.137;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ──
server {
    listen 443 ssl http2;
    server_name otaskflow.com www.otaskflow.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/otaskflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/otaskflow.com/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Max upload size
    client_max_body_size 20M;

    # Serve static files directly
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Serve media files directly
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://web_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
